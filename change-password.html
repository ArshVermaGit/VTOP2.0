<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 left-0 w-1/3 h-1/3 bg-cyan-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="change-password.html" class="text-white">Security</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-2xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12 text-center">
                <h1 class="text-4xl font-light text-white mb-2">Account Security</h1>
                <p class="text-gray-400 font-light">Update your password and security settings</p>
            </div>

            <!-- Password Form -->
            <div class="bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-sm">
                <div class="flex items-center space-x-4 mb-8">
                    <div class="bg-gradient-to-br from-cyan-500 to-blue-500 p-4 rounded-2xl">
                        <i data-lucide="lock" class="w-8 h-8 text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-light text-white">Change Password</h2>
                        <p class="text-gray-400 text-sm">Keep your account secure with a strong password</p>
                    </div>
                </div>

                <form id="change-password-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-3" for="old-password">Current Password</label>
                        <input 
                            id="old-password" 
                            data-testid="old-password-input" 
                            type="password" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                            required 
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-3" for="new-password">New Password</label>
                        <input 
                            id="new-password" 
                            data-testid="new-password-input" 
                            type="password" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                            required 
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-3" for="confirm-password">Confirm New Password</label>
                        <input 
                            id="confirm-password" 
                            data-testid="confirm-password-input" 
                            type="password" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                            required 
                        />
                    </div>
                    <button 
                        data-testid="change-password-button" 
                        type="submit" 
                        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium py-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02]"
                    >
                        Update Password
                    </button>
                </form>

                <!-- Security Tips -->
                <div class="mt-8 pt-8 border-t border-white/10">
                    <h3 class="text-lg font-light text-white mb-4">Security Tips</h3>
                    <div class="space-y-3 text-sm text-gray-400">
                        <div class="flex items-center space-x-3">
                            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                            <span>Use at least 8 characters</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                            <span>Include numbers and symbols</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                            <span>Avoid common words</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('change-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showToast('New passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showToast('Password must be at least 8 characters long', 'error');
                return;
            }
            
            showToast('Password updated successfully!', 'success');
            document.getElementById('change-password-form').reset();
        });

        lucide.createIcons();
    </script>
</body>
</html>
