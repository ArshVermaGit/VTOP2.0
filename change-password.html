<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black">
        <nav class="glass-effect border-b border-white/10 fixed w-full z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <button id="menu-toggle" class="lg:hidden text-gray-400 hover:text-white p-2">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                        <h1 class="text-2xl font-bold gradient-text">VTOP 2.0</h1>
                    </div>
                    <button id="logout-btn" class="text-gray-400 hover:text-white flex items-center p-2">
                        <i data-lucide="log-out" class="w-5 h-5 mr-2"></i>
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="flex pt-16">
            <aside id="sidebar" class="-translate-x-full lg:translate-x-0 fixed lg:sticky top-16 h-[calc(100vh-4rem)] w-64 glass-effect border-r border-white/10 transition-transform duration-300 z-40 overflow-y-auto">
                <nav class="p-4 space-y-2" id="sidebar-nav"></nav>
            </aside>

            <main class="flex-1 p-8">
                <div class="max-w-7xl mx-auto">
                    <div class="animate-fade-in" data-testid="change-password-container">
                        <h1 class="text-4xl font-bold mb-8 gradient-text" data-testid="change-password-title">Change Password</h1>

                        <div class="glass-effect p-8 border-white/10 rounded-lg max-w-xl">
                            <div class="flex items-center space-x-4 mb-6">
                                <div class="bg-gradient-to-br from-cyan-500 to-blue-500 p-4 rounded-2xl">
                                    <i data-lucide="lock" class="w-8 h-8 text-white"></i>
                                </div>
                                <div>
                                    <h2 class="text-2xl font-semibold text-white">Update Your Password</h2>
                                    <p class="text-gray-400 text-sm">Keep your account secure</p>
                                </div>
                            </div>

                            <form id="change-password-form" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2 text-gray-300" for="old-password">Current Password</label>
                                    <input id="old-password" data-testid="old-password-input" type="password" class="bg-white/5 border border-white/10 text-white rounded-lg p-3 w-full" required />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2 text-gray-300" for="new-password">New Password</label>
                                    <input id="new-password" data-testid="new-password-input" type="password" class="bg-white/5 border border-white/10 text-white rounded-lg p-3 w-full" required />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2 text-gray-300" for="confirm-password">Confirm New Password</label>
                                    <input id="confirm-password" data-testid="confirm-password-input" type="password" class="bg-white/5 border border-white/10 text-white rounded-lg p-3 w-full" required />
                                </div>
                                <button data-testid="change-password-button" type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white font-medium py-3 rounded-lg transition-all">
                                    Change Password
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('change-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showToast('New passwords do not match', 'error');
                return;
            }
            
            showToast('Password changed successfully!', 'success');
            document.getElementById('change-password-form').reset();
        });
    </script>
</body>
</html>
