<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav>
        <div class="nav-container">
            <div class="logo">VTOP<span>2.0</span></div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="exams.html">Exams</a></li>
                <li><a href="leave.html">Leave</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="hostel.html">Hostel</a></li>
                <li><a href="payments.html" class="active">Payments</a></li>
                <li><a href="curriculum.html">Curriculum</a></li>
            </ul>
            <div class="nav-profile">
                <span class="profile-id">21BCE001</span>
                <button class="btn-icon" id="change-password-btn" title="Change Password">
                    <i data-lucide="key" style="width: 20px; height: 20px;"></i>
                </button>
                <button class="btn-icon" id="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-3xl font-light mb-4">Payment History</h1>
        
        <div class="card mb-3">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-light">Total Paid This Year</h2>
                    <p class="text-gray">Academic Year 2024-25</p>
                </div>
                <div class="stat-value" id="total-paid">₹1,02,000</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title mb-3">Transaction History</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Payment Type</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="payments-table">
                        <!-- Payments will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/payments.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
