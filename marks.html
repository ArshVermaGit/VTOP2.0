<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav>
        <div class="nav-container">
            <div class="logo">VTOP<span>2.0</span></div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="marks.html" class="active">Marks</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="exams.html">Exams</a></li>
                <li><a href="leave.html">Leave</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="hostel.html">Hostel</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="curriculum.html">Curriculum</a></li>
            </ul>
            <div class="nav-profile">
                <span class="profile-id">24BCG10026</span>
                <button class="btn-icon" id="change-password-btn" title="Change Password">
                    <i data-lucide="key" style="width: 20px; height: 20px;"></i>
                </button>
                <button class="btn-icon" id="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-3xl font-light">Detailed Marks</h1>
                <p class="text-gray">Assessment-wise breakdown</p>
            </div>
            <a href="grades.html" class="btn btn-secondary">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px; margin-right: 0.5rem;"></i>
                Back to Grades
            </a>
        </div>

        <div class="grid grid-3 gap-3 mb-4">
            <div class="dashboard-stat">
                <div class="stat-value" id="total-assessments">12</div>
                <div class="stat-label">Total Assessments</div>
            </div>
            <div class="dashboard-stat">
                <div class="stat-value" id="average-score">85.4%</div>
                <div class="stat-label">Average Score</div>
            </div>
            <div class="dashboard-stat">
                <div class="stat-value" id="highest-score">98</div>
                <div class="stat-label">Highest Score</div>
            </div>
        </div>

        <div class="grid gap-4" id="marks-list">
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/marks.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
