<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 left-0 w-1/3 h-1/3 bg-cyan-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="attendance.html" class="text-white">Attendance</a>
                            <a href="grades.html" class="hover:text-white transition-colors">Grades</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-6xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12">
                <h1 class="text-4xl font-light text-white mb-2">Class Attendance</h1>
                <p class="text-gray-400 font-light">Track your attendance percentage across courses</p>
            </div>

            <!-- Overall Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm">
                    <div class="text-3xl font-light text-cyan-400 mb-2">93.5%</div>
                    <div class="text-sm text-gray-400">Overall Attendance</div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm">
                    <div class="text-3xl font-light text-green-400 mb-2">4</div>
                    <div class="text-sm text-gray-400">Courses Above 85%</div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm">
                    <div class="text-3xl font-light text-cyan-400 mb-2">209</div>
                    <div class="text-sm text-gray-400">Total Classes</div>
                </div>
            </div>

            <!-- Attendance Cards -->
            <div class="grid grid-cols-1 gap-6" id="attendance-list">
                <!-- Cards will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        const attendanceList = document.getElementById('attendance-list');
        const attendance = dataService.getAttendance();
        
        function getColorClass(percentage) {
            if (percentage >= 85) return "text-green-400";
            if (percentage >= 75) return "text-yellow-400";
            return "text-red-400";
        }
        
        function getProgressColor(percentage) {
            if (percentage >= 85) return "bg-green-400";
            if (percentage >= 75) return "bg-yellow-400";
            return "bg-red-400";
        }
        
        attendance.forEach((record, index) => {
            const card = document.createElement('div');
            card.className = 'bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all';
            card.setAttribute('data-testid', `attendance-card-${index}`);
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-xl font-light text-white mb-2" data-testid="course-name-${index}">${record.course_name}</h3>
                        <p class="text-gray-400" data-testid="course-code-${index}">${record.course_code}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-light ${getColorClass(record.percentage)} mb-1" data-testid="attendance-percentage-${index}">
                            ${record.percentage.toFixed(1)}%
                        </p>
                        <p class="text-sm text-gray-400" data-testid="attendance-ratio-${index}">
                            ${record.attended_classes}/${record.total_classes} classes
                        </p>
                    </div>
                </div>
                <div class="w-full bg-white/10 rounded-full h-2">
                    <div class="h-2 rounded-full ${getProgressColor(record.percentage)}" style="width: ${record.percentage}%"></div>
                </div>
            `;
            attendanceList.appendChild(card);
        });
    </script>
</body>
</html>
