<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTOP 2.0 - Student Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4266443141083729"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">VTOP<span class="text-cyan">2.0</span></h1>
                <p class="text-gray">Premium student experience. Pure academic focus.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="student-id" placeholder="Enter your Student ID" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
                
                <p class="text-center text-xs text-gray mt-3">
                    Demo: 24BCG10026 / 123
                </p>
            </form>

            <div class="grid grid-3 gap-2 mt-4" style="text-align: center;">
                <div>
                    <div class="text-cyan text-sm font-medium">Dashboard</div>
                    <div class="text-xs text-gray mt-1">Overview</div>
                </div>
                <div>
                    <div class="text-cyan text-sm font-medium">Attendance</div>
                    <div class="text-xs text-gray mt-1">Tracking</div>
                </div>
                <div>
                    <div class="text-cyan text-sm font-medium">Grades</div>
                    <div class="text-xs text-gray mt-1">Management</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
