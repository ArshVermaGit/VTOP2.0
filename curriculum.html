<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 left-0 w-1/3 h-1/3 bg-cyan-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="curriculum.html" class="text-white">Curriculum</a>
                            <a href="grades.html" class="hover:text-white transition-colors">Grades</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-6xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12">
                <h1 class="text-4xl font-light text-white mb-2">Academic Curriculum</h1>
                <p class="text-gray-400 font-light">Complete course structure and credits</p>
            </div>

            <!-- Program Overview -->
            <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <h3 class="text-lg font-light text-white mb-2">Program</h3>
                        <p class="text-cyan-400">B.Tech Computer Science</p>
                    </div>
                    <div>
                        <h3 class="text-lg font-light text-white mb-2">Duration</h3>
                        <p class="text-cyan-400">4 Years • 8 Semesters</p>
                    </div>
                    <div>
                        <h3 class="text-lg font-light text-white mb-2">Total Credits</h3>
                        <p class="text-cyan-400">160 Credits</p>
                    </div>
                </div>
            </div>

            <!-- Curriculum List -->
            <div class="space-y-6" id="curriculum-list">
                <!-- Curriculum will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const semesters = dataService.getCurriculum();
        const curriculumList = document.getElementById('curriculum-list');
        
        semesters.forEach((sem, index) => {
            const card = document.createElement('div');
            card.className = 'bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all';
            card.setAttribute('data-testid', `semester-card-${index}`);
            card.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-light text-white" data-testid="semester-title-${index}">Semester ${sem.semester}</h2>
                    <div class="text-cyan-400 text-sm font-medium">
                        ${sem.courses.reduce((total, course) => total + course.credits, 0)} Total Credits
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    ${sem.courses.map((course, idx) => `
                        <div class="bg-white/5 border border-white/10 rounded-xl p-4 flex items-center justify-between hover:border-cyan-400/30 transition-all" data-testid="course-${index}-${idx}">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 bg-cyan-500/10 rounded-lg flex items-center justify-center">
                                    <i data-lucide="book-open" class="w-5 h-5 text-cyan-400"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-light text-white" data-testid="course-name-${index}-${idx}">${course.name}</h3>
                                    <p class="text-gray-400 text-sm" data-testid="course-code-${index}-${idx}">${course.code}</p>
                                </div>
                            </div>
                            <span class="text-cyan-400 font-medium" data-testid="course-credits-${index}-${idx}">${course.credits} Credits</span>
                        </div>
                    `).join('')}
                </div>
            `;
            curriculumList.appendChild(card);
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
