<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 right-0 w-1/3 h-1/3 bg-purple-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="attendance.html" class="hover:text-white transition-colors">Attendance</a>
                            <a href="grades.html" class="text-white">Grades</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-6xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-4xl font-light text-white mb-2">Academic Grades</h1>
                    <p class="text-gray-400 font-light">Current semester performance</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 backdrop-blur-sm">
                    <p class="text-sm text-gray-400">Current GPA</p>
                    <p class="text-3xl font-light text-cyan-400" data-testid="current-gpa">8.92</p>
                </div>
            </div>

            <!-- Grades Grid -->
            <div class="grid grid-cols-1 gap-6" id="grades-container">
                <!-- Grades will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const grades = dataService.getGrades();
        const gpa = dataService.calculateGPA();
        const container = document.getElementById('grades-container');
        
        container.innerHTML = grades.map((r, i) => `
            <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all" data-testid="grade-card-${i}">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-light text-white mb-2" data-testid="grade-course-name-${i}">${r.course_name}</h3>
                        <p class="text-gray-400" data-testid="grade-course-code-${i}">${r.course_code}</p>
                        <p class="text-sm text-gray-500 mt-2" data-testid="grade-semester-${i}">Semester ${r.semester}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-5xl font-light text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 mb-2" data-testid="grade-value-${i}">${r.grade}</div>
                        <p class="text-sm text-gray-400" data-testid="grade-credits-${i}">${r.credits} Credits</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
