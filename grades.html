<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black">
        <nav class="glass-effect border-b border-white/10 fixed w-full z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <button id="menu-toggle" class="lg:hidden text-gray-400 hover:text-white p-2"><i data-lucide="menu" class="w-6 h-6"></i></button>
                        <h1 class="text-2xl font-bold gradient-text">VTOP 2.0</h1>
                    </div>
                    <button id="logout-btn" class="text-gray-400 hover:text-white flex items-center p-2"><i data-lucide="log-out" class="w-5 h-5 mr-2"></i>Logout</button>
                </div>
            </div>
        </nav>
        <div class="flex pt-16">
            <aside id="sidebar" class="-translate-x-full lg:translate-x-0 fixed lg:sticky top-16 h-[calc(100vh-4rem)] w-64 glass-effect border-r border-white/10 transition-transform duration-300 z-40 overflow-y-auto"><nav class="p-4 space-y-2" id="sidebar-nav"></nav></aside>
            <main class="flex-1 p-8"><div class="max-w-7xl mx-auto"><div class="animate-fade-in" data-testid="grades-container" id="page-content"></div></div></main>
        </div>
        <div id="overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>
    </div>
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const grades = dataService.getGrades();
        const gpa = dataService.calculateGPA();
        document.getElementById('page-content').innerHTML = `
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold gradient-text" data-testid="grades-title">Grades</h1>
                <div class="glass-effect px-6 py-4 border-white/10 rounded-lg">
                    <p class="text-sm text-gray-400">Current GPA</p>
                    <p class="text-3xl font-bold text-cyan-400" data-testid="current-gpa">${gpa}</p>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-6">
                ${grades.map((r, i) => `
                    <div class="glass-effect p-6 border-white/10 rounded-lg" data-testid="grade-card-${i}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="text-xl font-semibold text-white" data-testid="grade-course-name-${i}">${r.course_name}</h3>
                                <p class="text-gray-400" data-testid="grade-course-code-${i}">${r.course_code}</p>
                                <p class="text-sm text-gray-500 mt-1" data-testid="grade-semester-${i}">Semester ${r.semester}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500" data-testid="grade-value-${i}">${r.grade}</div>
                                <p class="text-sm text-gray-400 mt-1" data-testid="grade-credits-${i}">${r.credits} Credits</p>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    </script>
</body>
</html>
