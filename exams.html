<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Schedule - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute bottom-0 left-0 w-1/3 h-1/3 bg-purple-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="attendance.html" class="hover:text-white transition-colors">Attendance</a>
                            <a href="exams.html" class="text-white">Exams</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-6xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12">
                <h1 class="text-4xl font-light text-white mb-2">Exam Schedule</h1>
                <p class="text-gray-400 font-light">Upcoming examinations and venues</p>
            </div>

            <!-- Exams List -->
            <div class="grid grid-cols-1 gap-6" id="exams-list">
                <!-- Exams will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const exams = dataService.getExams();
        const examsList = document.getElementById('exams-list');
        
        exams.forEach((exam, index) => {
            const card = document.createElement('div');
            card.className = 'bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all';
            card.setAttribute('data-testid', `exam-card-${index}`);
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h3 class="text-2xl font-light text-white mb-3" data-testid="exam-course-name-${index}">${exam.course_name}</h3>
                        <div class="space-y-2">
                            <div class="flex items-center space-x-3">
                                <i data-lucide="calendar" class="w-5 h-5 text-cyan-400"></i>
                                <span class="text-gray-300" data-testid="exam-date-${index}">${exam.date}</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <i data-lucide="clock" class="w-5 h-5 text-cyan-400"></i>
                                <span class="text-gray-300" data-testid="exam-time-${index}">${exam.time}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-light text-cyan-400 mb-3" data-testid="exam-type-${index}">${exam.exam_type}</p>
                        <div class="flex items-center space-x-2 text-green-400">
                            <i data-lucide="map-pin" class="w-4 h-4"></i>
                            <span class="text-sm" data-testid="exam-venue-${index}">${exam.venue}</span>
                        </div>
                    </div>
                </div>
            `;
            examsList.appendChild(card);
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
