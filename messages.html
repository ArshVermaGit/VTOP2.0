<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black">
        <nav class="glass-effect border-b border-white/10 fixed w-full z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <button id="menu-toggle" class="lg:hidden text-gray-400 hover:text-white p-2">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                        <h1 class="text-2xl font-bold gradient-text">VTOP 2.0</h1>
                    </div>
                    <button id="logout-btn" class="text-gray-400 hover:text-white flex items-center p-2">
                        <i data-lucide="log-out" class="w-5 h-5 mr-2"></i>
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="flex pt-16">
            <aside id="sidebar" class="-translate-x-full lg:translate-x-0 fixed lg:sticky top-16 h-[calc(100vh-4rem)] w-64 glass-effect border-r border-white/10 transition-transform duration-300 z-40 overflow-y-auto">
                <nav class="p-4 space-y-2" id="sidebar-nav"></nav>
            </aside>

            <main class="flex-1 p-8">
                <div class="max-w-7xl mx-auto">
                    <div class="animate-fade-in" data-testid="messages-container">
                        <h1 class="text-4xl font-bold mb-8 gradient-text" data-testid="messages-title">Class Messages</h1>
                        <div class="grid grid-cols-1 gap-6" id="messages-list"></div>
                    </div>
                </div>
            </main>
        </div>

        <div id="overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const messages = dataService.getMessages();
        const messagesList = document.getElementById('messages-list');
        
        messages.forEach((message, index) => {
            const card = document.createElement('div');
            card.className = 'glass-effect p-6 border-white/10 rounded-lg';
            card.setAttribute('data-testid', `message-card-${index}`);
            card.innerHTML = `
                <div class="flex items-start space-x-4">
                    <div class="bg-gradient-to-br from-cyan-500 to-blue-500 p-3 rounded-lg flex-shrink-0">
                        <i data-lucide="message-square" class="w-6 h-6 text-white"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-semibold text-white mb-1" data-testid="message-course-name-${index}">${message.course_name}</h3>
                        <p class="text-gray-400 text-sm mb-3" data-testid="message-course-code-${index}">${message.course_code}</p>
                        <p class="text-gray-300 mb-3" data-testid="message-content-${index}">${message.message}</p>
                        <div class="flex items-center space-x-4 text-sm text-gray-400">
                            <div class="flex items-center space-x-1">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span data-testid="message-faculty-${index}">${message.faculty}</span>
                            </div>
                            <div class="flex items-center space-x-1">
                                <i data-lucide="calendar" class="w-4 h-4"></i>
                                <span data-testid="message-date-${index}">${message.date}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            messagesList.appendChild(card);
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
