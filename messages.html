<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 left-0 w-1/3 h-1/3 bg-cyan-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="attendance.html" class="hover:text-white transition-colors">Attendance</a>
                            <a href="messages.html" class="text-white">Messages</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-4xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12 text-center">
                <h1 class="text-4xl font-light text-white mb-2">Class Messages</h1>
                <p class="text-gray-400 font-light">Important updates from your faculty</p>
            </div>

            <!-- Messages List -->
            <div class="space-y-6" id="messages-list">
                <!-- Messages will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const messages = dataService.getMessages();
        const messagesList = document.getElementById('messages-list');
        
        messages.forEach((message, index) => {
            const card = document.createElement('div');
            card.className = 'bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all';
            card.setAttribute('data-testid', `message-card-${index}`);
            card.innerHTML = `
                <div class="flex items-start space-x-4">
                    <div class="bg-gradient-to-br from-cyan-500 to-blue-500 p-3 rounded-xl flex-shrink-0">
                        <i data-lucide="message-square" class="w-6 h-6 text-white"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-light text-white mb-2" data-testid="message-course-name-${index}">${message.course_name}</h3>
                        <p class="text-cyan-400 text-sm mb-3" data-testid="message-course-code-${index}">${message.course_code}</p>
                        <p class="text-gray-300 mb-4 leading-relaxed" data-testid="message-content-${index}">${message.message}</p>
                        <div class="flex items-center space-x-6 text-sm text-gray-400">
                            <div class="flex items-center space-x-2">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span data-testid="message-faculty-${index}">${message.faculty}</span>
                            </div>
                            <div class="flex items-center space-x-2">
                                <i data-lucide="calendar" class="w-4 h-4"></i>
                                <span data-testid="message-date-${index}">${message.date}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            messagesList.appendChild(card);
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
