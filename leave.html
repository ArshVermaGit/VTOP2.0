<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav>
        <div class="nav-container">
            <div class="logo">VTOP<span>2.0</span></div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="exams.html">Exams</a></li>
                <li><a href="leave.html" class="active">Leave</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="hostel.html">Hostel</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="curriculum.html">Curriculum</a></li>
            </ul>
            <div class="nav-profile">
                <span class="profile-id">24BCG10026</span>
                <button class="btn-icon" id="change-password-btn" title="Change Password">
                    <i data-lucide="key" style="width: 20px; height: 20px;"></i>
                </button>
                <button class="btn-icon" id="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-3xl font-light mb-4">Leave Management</h1>
        
        <div class="card mb-3">
            <h3 class="card-title mb-3">Apply for Leave</h3>
            <form id="leave-form" class="grid gap-3">
                <div>
                    <label>Leave Type</label>
                    <select id="leave-type" required>
                        <option value="">Select Type</option>
                        <option value="Medical">Medical</option>
                        <option value="Personal">Personal</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>
                <div class="grid grid-2 gap-2">
                    <div>
                        <label>From Date</label>
                        <input type="date" id="from-date" required>
                    </div>
                    <div>
                        <label>To Date</label>
                        <input type="date" id="to-date" required>
                    </div>
                </div>
                <div>
                    <label>Reason</label>
                    <textarea id="reason" rows="4" placeholder="Enter reason for leave" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </form>
        </div>

        <div class="card">
            <h3 class="card-title mb-3">Leave History</h3>
            <div class="grid gap-2" id="leave-history">
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/leave.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
