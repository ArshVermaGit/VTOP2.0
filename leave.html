<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Request - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black relative overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-900 via-black to-gray-900"></div>
        <div class="absolute top-0 left-0 w-1/3 h-1/3 bg-cyan-500/5 rounded-full blur-3xl"></div>

        <!-- Navigation -->
        <nav class="relative z-50 border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-light tracking-tight text-white">VTOP<span class="text-cyan-400">2.0</span></h1>
                        <nav class="hidden md:flex space-x-6 text-sm text-gray-400">
                            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
                            <a href="profile.html" class="hover:text-white transition-colors">Profile</a>
                            <a href="leave.html" class="text-white">Leave</a>
                            <a href="attendance.html" class="hover:text-white transition-colors">Attendance</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-400">21BCE001</span>
                        <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-6xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-12">
                <h1 class="text-4xl font-light text-white mb-2">Leave Management</h1>
                <p class="text-gray-400 font-light">Request and track your leave applications</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Leave Form -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm">
                    <h2 class="text-2xl font-light text-white mb-6">New Leave Request</h2>
                    <form id="leave-form" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-3">Leave Type</label>
                            <input 
                                id="leave-type" 
                                data-testid="leave-type-input" 
                                type="text" 
                                value="Sick Leave" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                            />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-3">From Date</label>
                                <input 
                                    id="from-date" 
                                    data-testid="from-date-input" 
                                    type="date" 
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                                    required 
                                />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-3">To Date</label>
                                <input 
                                    id="to-date" 
                                    data-testid="to-date-input" 
                                    type="date" 
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                                    required 
                                />
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-3">Reason</label>
                            <textarea 
                                id="reason" 
                                data-testid="reason-textarea" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
                                rows="4" 
                                placeholder="Briefly explain the reason for your leave..."
                                required
                            ></textarea>
                        </div>
                        <button 
                            data-testid="submit-leave-button" 
                            type="submit" 
                            class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium py-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02]"
                        >
                            Submit Leave Request
                        </button>
                    </form>
                </div>

                <!-- Leave History -->
                <div>
                    <h2 class="text-2xl font-light text-white mb-6">Previous Requests</h2>
                    <div class="space-y-4" id="leave-history">
                        <!-- Leave history will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        function getStatusColor(status) {
            if (status === "Approved") return "text-green-400";
            if (status === "Rejected") return "text-red-400";
            return "text-yellow-400";
        }
        
        function loadLeaveHistory() {
            const leaves = dataService.getLeaveRequests();
            const leaveHistory = document.getElementById('leave-history');
            leaveHistory.innerHTML = '';
            
            if (leaves.length === 0) {
                leaveHistory.innerHTML = `
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-8 text-center">
                        <i data-lucide="inbox" class="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                        <p class="text-gray-400">No leave requests submitted yet</p>
                    </div>
                `;
                return;
            }
            
            leaves.forEach((leave, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm hover:border-cyan-400/30 transition-all';
                card.setAttribute('data-testid', `leave-history-card-${index}`);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-light text-white mb-2" data-testid="leave-type-${index}">${leave.leave_type}</h3>
                            <p class="text-cyan-400 text-sm" data-testid="leave-dates-${index}">${leave.from_date} to ${leave.to_date}</p>
                        </div>
                        <span class="font-medium ${getStatusColor(leave.status)}" data-testid="leave-status-${index}">
                            ${leave.status}
                        </span>
                    </div>
                    <p class="text-gray-300 text-sm" data-testid="leave-reason-${index}">${leave.reason}</p>
                `;
                leaveHistory.appendChild(card);
            });
        }
        
        loadLeaveHistory();
        
        document.getElementById('leave-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const leaveData = {
                leave_type: document.getElementById('leave-type').value,
                from_date: document.getElementById('from-date').value,
                to_date: document.getElementById('to-date').value,
                reason: document.getElementById('reason').value
            };
            dataService.submitLeaveRequest(leaveData);
            showToast('Leave request submitted successfully!', 'success');
            document.getElementById('leave-form').reset();
            document.getElementById('leave-type').value = 'Sick Leave';
            loadLeaveHistory();
        });

        lucide.createIcons();
    </script>
</body>
</html>
