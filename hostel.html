<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav>
        <div class="nav-container">
            <div class="logo">VTOP<span>2.0</span></div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="exams.html">Exams</a></li>
                <li><a href="leave.html">Leave</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="hostel.html" class="active">Hostel</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="curriculum.html">Curriculum</a></li>
            </ul>
            <div class="nav-profile">
                <span class="profile-id">21BCE001</span>
                <button class="btn-icon" id="change-password-btn" title="Change Password">
                    <i data-lucide="key" style="width: 20px; height: 20px;"></i>
                </button>
                <button class="btn-icon" id="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-3xl font-light mb-4">Hostel Accommodation</h1>
        
        <div class="card">
            <div class="flex gap-3 mb-4">
                <div style="width: 100px; height: 100px; border-radius: 1.5rem; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(34, 197, 94, 0.2)); display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="home" style="width: 50px; height: 50px; color: #10b981;"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-light mb-1">Room Allocation</h2>
                    <p class="text-gray">Your residential details</p>
                </div>
            </div>

            <div class="grid grid-2 gap-3 mb-4" id="hostel-details">
                <!-- Hostel details will be populated by JavaScript -->
            </div>

            <div class="border-t" style="border-color: rgba(255,255,255,0.08); padding-top: 1.5rem;">
                <h3 class="text-xl font-light mb-3">Facilities</h3>
                <div class="grid grid-4 gap-2">
                    <div class="text-center">
                        <i data-lucide="wifi" class="text-cyan" style="width: 40px; height: 40px; margin: 0 auto 0.5rem;"></i>
                        <div class="text-sm">WiFi</div>
                    </div>
                    <div class="text-center">
                        <i data-lucide="utensils" class="text-cyan" style="width: 40px; height: 40px; margin: 0 auto 0.5rem;"></i>
                        <div class="text-sm">Mess</div>
                    </div>
                    <div class="text-center">
                        <i data-lucide="dumbbell" class="text-cyan" style="width: 40px; height: 40px; margin: 0 auto 0.5rem;"></i>
                        <div class="text-sm">Gym</div>
                    </div>
                    <div class="text-center">
                        <i data-lucide="book-open" class="text-cyan" style="width: 40px; height: 40px; margin: 0 auto 0.5rem;"></i>
                        <div class="text-sm">Library</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/hostel.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
