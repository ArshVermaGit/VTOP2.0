<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel - VTOP 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="min-h-screen bg-black">
        <nav class="glass-effect border-b border-white/10 fixed w-full z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <button id="menu-toggle" class="lg:hidden text-gray-400 hover:text-white p-2">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                        <h1 class="text-2xl font-bold gradient-text">VTOP 2.0</h1>
                    </div>
                    <button id="logout-btn" class="text-gray-400 hover:text-white flex items-center p-2">
                        <i data-lucide="log-out" class="w-5 h-5 mr-2"></i>
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="flex pt-16">
            <aside id="sidebar" class="-translate-x-full lg:translate-x-0 fixed lg:sticky top-16 h-[calc(100vh-4rem)] w-64 glass-effect border-r border-white/10 transition-transform duration-300 z-40 overflow-y-auto">
                <nav class="p-4 space-y-2" id="sidebar-nav"></nav>
            </aside>

            <main class="flex-1 p-8">
                <div class="max-w-7xl mx-auto">
                    <div class="animate-fade-in" data-testid="hostel-container">
                        <h1 class="text-4xl font-bold mb-8 gradient-text" data-testid="hostel-title">Hostel Room Allotment</h1>

                        <div class="glass-effect p-8 border-white/10 rounded-lg">
                            <div class="flex items-start space-x-6">
                                <div class="bg-gradient-to-br from-cyan-500 to-blue-500 p-6 rounded-2xl flex-shrink-0">
                                    <i data-lucide="home" class="w-12 h-12 text-white"></i>
                                </div>
                                <div class="flex-1">
                                    <h2 class="text-3xl font-bold text-white mb-6">Your Room Details</h2>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="hostel-details"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        const hostel = dataService.getHostel();
        const hostelDetails = document.getElementById('hostel-details');
        
        const details = [
            { label: 'Block', value: hostel.block, testid: 'hostel-block' },
            { label: 'Room Number', value: hostel.room_number, testid: 'hostel-room' },
            { label: 'Bed Number', value: hostel.bed_number, testid: 'hostel-bed' },
            { label: 'Allotment Date', value: hostel.allotment_date, testid: 'hostel-date', icon: 'calendar' }
        ];
        
        details.forEach(detail => {
            const div = document.createElement('div');
            div.className = 'bg-white/5 p-4 rounded-lg';
            div.innerHTML = `
                <p class="text-sm text-gray-400 mb-1">${detail.label}</p>
                ${detail.icon ? `
                    <div class="flex items-center space-x-2">
                        <i data-lucide="${detail.icon}" class="w-5 h-5 text-cyan-400"></i>
                        <p class="text-xl font-semibold text-white" data-testid="${detail.testid}">${detail.value}</p>
                    </div>
                ` : `
                    <p class="text-2xl font-semibold text-cyan-400" data-testid="${detail.testid}">${detail.value}</p>
                `}
            `;
            hostelDetails.appendChild(div);
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
